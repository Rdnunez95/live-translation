<!DOCTYPE html>
<html>
<head>
  <title>Live Translation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      padding: 30px;
    }

    .lang {
      margin-bottom: 40px;
      padding: 20px;
      border: 2px solid #ddd;
      border-radius: 10px;
    }

    h2 {
      margin-top: 0;
    }

    .text {
      font-size: 32px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="lang">
  <h2>English</h2>
  <div class="text">
    Good morning and welcome to our ceremony.
  </div>
</div>

<div class="lang">
  <h2>Español</h2>
  <div class="text">
    Buenos días y bienvenidos a nuestra ceremonia.
  </div>
</div>

<div class="lang">
  <h2>Português</h2>
  <div class="text">
    Bom dia e bem-vindos à nossa cerimônia.
  </div>
</div>

</body>
</html>
